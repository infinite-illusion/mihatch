name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    name: fmt + vet + test + race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "$out"; echo "gofmt issues above"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: go test -race
        run: go test -race ./...

  build:
    name: build darwin/arm64 + checksum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Build (darwin/arm64, no CGO)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o mihatch ./cmd/mihatch
      - name: SHA-256 checksum
        run: shasum -a 256 mihatch | tee checksums.txt
      - uses: actions/upload-artifact@v4
        with:
          name: mihatch-darwin-arm64
          path: |
            mihatch
            checksums.txt
